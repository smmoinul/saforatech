<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaforaTech Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-section)">

<div style="width:100%;max-width:420px;padding:0 20px">
  <div style="text-align:center;margin-bottom:32px">
    <a href="/" class="logo" style="justify-content:center;font-size:1.4rem">
      <div class="logo-icon">ST</div>
      SaforaTech
    </a>
    <p style="color:var(--text-muted);font-size:0.875rem;margin-top:8px">Admin Panel — Secure Login</p>
  </div>

  <div class="contact-form" style="padding:40px 36px">
    <h2 style="font-family:var(--font-display);font-weight:800;font-size:1.5rem;margin-bottom:8px">Welcome back</h2>
    <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:28px">Sign in to your admin account</p>

    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;padding:14px">
        Sign In →
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--text-muted)">
      <a href="/" style="color:var(--primary);text-decoration:none">← Back to Website</a>
    </p>
  </div>

  <!-- Theme toggle -->
  <div style="text-align:center;margin-top:16px">
    <button onclick="toggleTheme()" class="btn-icon" style="margin:0 auto" title="Toggle theme">
      <span id="theme-icon">🌙</span>
    </button>
  </div>
</div>

<script src="/static/js/main.js"></script>
</body>
</html>
