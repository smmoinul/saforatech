<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaforaTech — Signing In...</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/static/js/supabase-client.js"></script>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
  <div style="text-align:center;max-width:360px;padding:40px 20px">
    <img src="/static/images/logo.svg" alt="SaforaTech" height="44" style="margin-bottom:24px" />
    <div class="loader-ring" style="margin:0 auto 20px"></div>
    <h2 style="font-family:var(--font-display);font-weight:800;font-size:1.4rem;color:var(--text);margin-bottom:8px">Signing you in...</h2>
    <p style="color:var(--text-muted);font-size:0.9rem" id="status-msg">Please wait while we verify your account.</p>
  </div>
  <script>
    (async () => {
      try {
        const sb = getSupabase();
        // Handle the OAuth callback — Supabase auto-reads the URL hash/params
        const { data, error } = await sb.auth.getSession();
        if (error) throw error;
        if (data.session) {
          document.getElementById('status-msg').textContent = '✅ Signed in! Redirecting...';
          setTimeout(() => { window.location.href = '/'; }, 1200);
        } else {
          // Try exchanging the code if present
          const params = new URLSearchParams(window.location.search);
          const code = params.get('code');
          if (code) {
            const { error: exchErr } = await sb.auth.exchangeCodeForSession(code);
            if (exchErr) throw exchErr;
            document.getElementById('status-msg').textContent = '✅ Signed in! Redirecting...';
            setTimeout(() => { window.location.href = '/'; }, 1200);
          } else {
            document.getElementById('status-msg').textContent = '❌ Could not sign in. Redirecting...';
            setTimeout(() => { window.location.href = '/'; }, 2000);
          }
        }
      } catch(e) {
        document.getElementById('status-msg').textContent = '❌ Error: ' + e.message;
        setTimeout(() => { window.location.href = '/'; }, 2500);
      }
    })();
  </script>
</body>
</html>
