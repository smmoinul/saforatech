<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaforaTech — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="stylesheet" href="/static/css/auth.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/static/js/supabase-client.js"></script>
  <script src="/static/js/main.js"></script>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-section)">
  <div style="width:100%;max-width:420px;padding:0 20px">
    <div style="text-align:center;margin-bottom:28px">
      <a href="/"><img src="/static/images/logo.svg" alt="SaforaTech" height="44" /></a>
    </div>
    <div class="contact-form" style="padding:36px">
      <h2 class="auth-title">Set New Password</h2>
      <p class="auth-subtitle">Choose a strong password for your account.</p>
      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div style="position:relative">
            <input type="password" id="new-password" class="form-control" placeholder="Min. 8 characters" minlength="8" required />
            <button type="button" class="pwd-toggle" onclick="togglePwd('new-password',this)">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div style="position:relative">
            <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter password" required />
            <button type="button" class="pwd-toggle" onclick="togglePwd('confirm-password',this)">👁</button>
          </div>
        </div>
        <div id="reset-error" class="auth-error hidden"></div>
        <div id="reset-success" class="auth-success hidden"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="reset-btn">Update Password</button>
      </form>
    </div>
  </div>
  <script>
    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁' : '🙈';
    }
    async function handleReset(e) {
      e.preventDefault();
      const pw  = document.getElementById('new-password').value;
      const pw2 = document.getElementById('confirm-password').value;
      const err = document.getElementById('reset-error');
      const ok  = document.getElementById('reset-success');
      err.classList.add('hidden'); ok.classList.add('hidden');
      if (pw !== pw2) { err.textContent = '❌ Passwords do not match.'; err.classList.remove('hidden'); return; }
      const btn = document.getElementById('reset-btn');
      btn.disabled = true; btn.textContent = 'Updating...';
      const sb = getSupabase();
      const { error } = await sb.auth.updateUser({ password: pw });
      btn.disabled = false; btn.textContent = 'Update Password';
      if (error) { err.textContent = '❌ ' + error.message; err.classList.remove('hidden'); }
      else {
        ok.textContent = '✅ Password updated! Redirecting to home...';
        ok.classList.remove('hidden');
        setTimeout(() => { window.location.href = '/'; }, 2000);
      }
    }
  </script>
</body>
</html>
