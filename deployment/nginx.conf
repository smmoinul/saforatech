# ============================================================
# Nginx Configuration — SaforaTech
# saforatech.com + subdomains
# ============================================================

# ── Main Website: saforatech.com ────────────────────────────
server {
    listen 80;
    server_name saforatech.com www.saforatech.com saforatech.com.bd www.saforatech.com.bd;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name saforatech.com www.saforatech.com;

    ssl_certificate     /etc/letsencrypt/live/saforatech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saforatech.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Static files — serve directly
    location /static/ {
        alias /var/www/saforatech/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Main FastAPI app
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_buffering    off;
    }
}

# ── .bd Domain redirect → .com ──────────────────────────────
server {
    listen 443 ssl http2;
    server_name saforatech.com.bd www.saforatech.com.bd;

    ssl_certificate     /etc/letsencrypt/live/saforatech.com.bd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saforatech.com.bd/privkey.pem;

    # Redirect .bd → .com
    return 301 https://saforatech.com$request_uri;
}

